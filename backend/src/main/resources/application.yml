server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-notes-backend
  profiles:
    active: dev

  # Jackson Configuration
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
      enabled: true
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_notes?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456

# MyBatis Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-value: 0
      logic-not-delete-value: 1

# Knife4j (Swagger) Configuration
knife4j:
  enable: true
  setting:
    language: zh_cn

# MinIO Configuration
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: ai-notes

# JWT Configuration
jwt:
  secret: ai-notes-secret-key-2024-must-be-at-least-32-chars
  expiration: 7200000  # 2小时

# AI Configuration
ai:
  deepseek:
    base-url: https://api.deepseek.com/v1
    api-key: ${DEEPSEEK_API_KEY:}
    default-model: deepseek-chat
    models:
      - deepseek-chat
      - deepseek-coder
  glm:
    base-url: https://open.bigmodel.cn/api/paas/v4
    api-key: ${GLM_API_KEY:}
    default-model: glm-4-flash
    models:
      - glm-4
      - glm-4-flash
      - glm-3-turbo

# Logging Configuration
logging:
  level:
    com.ainotes: debug
    com.baomidou.mybatisplus: debug
